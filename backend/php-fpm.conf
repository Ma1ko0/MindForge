[global]
; Emergency restart threshold
emergency_restart_threshold = 10
emergency_restart_interval = 1m
process_control_timeout = 10s

; Error logging
error_log = /var/www/logs/php-fpm-error.log
log_level = warning

; Include additional config files
include=/usr/local/etc/php-fpm.d/*.conf

[www]
; Unix user/group
user = www-data
group = www-data

; Address
listen = 9000

; TCP backlog
listen.backlog = 511

; Allowed clients
;listen.allowed_clients = 127.0.0.1

; Process manager
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Logging
access.log = /var/www/logs/php-fpm-access.log
access.format = "%R - %u %t \"%m %r\" %s %l %{mili}d %{kilobytes}M %C%%"

; Process status
pm.status_path = /status
ping.path = /ping
ping.response = pong

; Security
clear_env = no

version: '3.8'

services:
      frontend:
          image: nginx:alpine
          container_name: frontend
          volumes:
            - ./frontend:/usr/share/nginx/html:ro
            - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
            - ./frontend/certs:/etc/nginx/certs:ro
          ports:
            - "443:443"   # HTTPS lokal
          networks:
            - web
          restart: always
          healthcheck:
            test: ["CMD", "sh", "-c", "netstat -tuln | grep -q 443"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
          deploy:
            resources:
              limits:
                cpus: '1'
                memory: 256M
              reservations:
                cpus: '0.25'
                memory: 128M

# --- BACKEND ---
      api:
          build:
            context: ./backend
            dockerfile: Dockerfile.api
          container_name: api
          working_dir: /var/www
          environment:
            docker: "true"
            DB_HOST: ${DB_HOST}
            DB_NAME: ${DB_NAME}
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DEBUG_MODE: ${DEBUG_MODE}
            TIMEZONE: ${TIMEZONE}
            LOCALE: ${LOCALE}
            LOG_LEVEL: ${LOG_LEVEL}
            JWT_SECRET: ${JWT_SECRET}
            JWT_ALGORITHM: ${JWT_ALGORITHM}
            JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
            JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
            ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
          volumes:
            - ./backend:/var/www
            - ./backend/logs:/var/www/logs
          networks:
            - web
          depends_on:
            mydb:
              condition: service_healthy
          restart: always
          deploy:
            resources:
              limits:
                cpus: '1'
                memory: 512M
              reservations:
                cpus: '0.5'
                memory: 256M
          healthcheck:
            test: ["CMD", "sh", "-c", "ps aux | grep -q '[p]hp-fpm'"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5s

      mydb:
        container_name: mydb
        hostname: mydb
        image: mariadb:latest
        restart: always
        networks:
            - web
        ports:
            - '3306:3306'
        expose:
            - '3306'
        environment:
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_TCP_PORT: 3306
            MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
        volumes:
            - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
          test: ["CMD", "test", "-S", "/run/mysqld/mysqld.sock"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 40s
        deploy:
          resources:
            limits:
              cpus: '2'
              memory: 1024M
            reservations:
              cpus: '1'
              memory: 512M
      phpmyadmin:
        image: phpmyadmin:5.2.2
        restart: always
        ports:
            - '9090:80'
        networks:
            - web
        environment:
            PMA_HOST: ${DB_HOST}
            PMA_USER: ${DB_USER}
            PMA_PASSWORD: ${DB_PASSWORD}
        deploy:
          resources:
            limits:
              cpus: '0.5'
              memory: 256M
            reservations:
              cpus: '0.25'
              memory: 128M
networks:
    web:
        driver: bridge
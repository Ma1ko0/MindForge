<div class="auth-page">
	<div class="auth-card card shadow-lg">
		<div class="card-body p-4 p-md-5">
			<div class="text-center mb-4">
				<div class="auth-icon mb-3">
					<i class="fa-solid fa-arrow-right-to-bracket"></i>
				</div>
				<h3 class="mb-1">Willkommen zurück</h3>
				<p class="text-muted mb-0">Logge dich in dein MindForge ein.</p>
			</div>

			<form action="/login" method="post" hx-post="/login" hx-target="#login-result" hx-swap="innerHTML" hx-indicator="#loginSpinner" data-mf-auth-form>
				<div class="mb-3">
					<label for="emailLoginForm" class="form-label">E-Mail</label>
					<input id="emailLoginForm" name="email" class="form-control form-control-lg" type="email" autocomplete="username" required />
				</div>

				<div class="mb-3">
					<label for="passwordLoginForm" class="form-label">Passwort</label>
					<input id="passwordLoginForm" name="password" class="form-control form-control-lg" type="password" autocomplete="current-password" required />
				</div>

				<button class="btn btn-primary btn-lg w-100 mt-2" type="submit">
					<span id="loginSpinner" class="spinner-border spinner-border-sm htmx-indicator me-2"></span>
					Einloggen
				</button>
			</form>

			<div id="login-result" class="mt-3"></div>

			<div class="text-center mt-4">
				<span class="text-muted">Noch keinen Account? </span>
				<a class="auth-link" hx-get="/views/register/index.html" hx-target="#main-content" hx-swap="innerHTML" role="button">Registrieren</a>
			</div>
		</div>
	</div>
</div>

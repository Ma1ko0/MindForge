<div class="container vh-100 d-flex justify-content-center align-items-center">
	<div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">
		<div class="card-body">
			<h4 class="card-title text-center mb-4">Login</h4>

			<form hx-post="/api/login" hx-target="#login-result" hx-swap="innerHTML" hx-indicator="#spinner">
				<div class="mb-3">
					<label for="emailLoginForm" class="form-label">Email</label>
					<input id="emailLoginForm" name="email" class="form-control" type="email" required />
				</div>

				<div class="mb-3">
					<label for="passwordLoginForm" class="form-label">Password</label>
					<input id="passwordLoginForm" name="password" class="form-control" type="password" required />
				</div>

				<button class="btn btn-primary w-100 mt-3">
					<span id="spinner" class="spinner-border spinner-border-sm htmx-indicator"></span>
					Login
				</button>
				<nav class="nav">
					<a class="nav-link active" aria-current="page" hx-get="/views/register/index.html" href="" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">Need an Account?</a>
				</nav>
			</form>

			<div id="login-result" class="mt-3"></div>
		</div>
	</div>
</div>

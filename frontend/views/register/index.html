<div class="auth-page">
	<div class="auth-card card shadow-lg">
		<div class="card-body p-4 p-md-5">
			<div class="text-center mb-4">
				<div class="auth-icon mb-3">
					<i class="fa-solid fa-user-plus"></i>
				</div>
				<h3 class="mb-1">Account erstellen</h3>
				<p class="text-muted mb-0">Starte dein zweites Gehirn.</p>
			</div>

			<form action="/register" method="post" hx-post="/register" hx-target="#register-result" hx-swap="innerHTML" hx-indicator="#registerSpinner" data-mf-auth-form>
				<div class="mb-3">
					<label for="usernameRegisterForm" class="form-label">Benutzername</label>
					<input id="usernameRegisterForm" name="username" class="form-control form-control-lg" type="text" autocomplete="username" required />
				</div>
				<div class="mb-3">
					<label for="emailRegisterForm" class="form-label">E-Mail</label>
					<input id="emailRegisterForm" name="email" class="form-control form-control-lg" type="email" autocomplete="email" required />
				</div>
				<div class="mb-3">
					<label for="passwordRegisterForm" class="form-label">Passwort</label>
					<input id="passwordRegisterForm" name="password" class="form-control form-control-lg" type="password" autocomplete="new-password" minlength="8" required />
					<div class="form-text">Mindestens 8 Zeichen.</div>
				</div>
				<div class="mb-3">
					<label for="passwordConfirmRegisterForm" class="form-label">Passwort bestätigen</label>
					<input id="passwordConfirmRegisterForm" name="passwordConfirm" class="form-control form-control-lg" type="password" autocomplete="new-password" minlength="8" required />
				</div>

				<button class="btn btn-primary btn-lg w-100 mt-2" type="submit">
					<span id="registerSpinner" class="spinner-border spinner-border-sm htmx-indicator me-2"></span>
					Registrieren
				</button>
			</form>

			<div id="register-result" class="mt-3"></div>

			<div class="text-center mt-4">
				<span class="text-muted">Bereits Account? </span>
				<a class="auth-link" hx-get="/views/login/index.html" hx-target="#main-content" hx-swap="innerHTML" role="button">Einloggen</a>
			</div>
		</div>
	</div>
</div>

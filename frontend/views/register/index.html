<div class="container vh-100 d-flex justify-content-center align-items-center">
	<div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">
		<div class="card-body">
			<h4 class="card-title text-center mb-4">Register</h4>

			<form hx-post="/api/register" hx-target="#register-result" hx-swap="innerHTML"
				hx-indicator="#spinner">
				<div class="mb-3">
					<label for="usernameRegisterForm" class="form-label">Name</label>
					<input id="usernameRegisterForm" name="username" class="form-control" type="text" required />
				</div>
				<div class="mb-3">
					<label for="emailRegisterForm" class="form-label">Email</label>
					<input id="emailRegisterForm" name="email" class="form-control" type="email" required />
				</div>

				<div class="mb-3">
					<label for="passwordRegisterForm" class="form-label">Password</label>
					<input id="passwordRegisterForm" name="password" class="form-control" type="password" required />
				</div>
				<div class="mb-3">
					<label for="passwordConfirmRegisterForm" class="form-label">Confirm Password</label>
					<input id="passwordConfirmRegisterForm" name="passwordConfirm" class="form-control" type="password" required />
				</div>

				<button class="btn btn-primary w-100 mt-3">
					<span id="spinner" class="spinner-border spinner-border-sm htmx-indicator"></span>
					Register
				</button>
				<nav class="nav">
					<a class="nav-link active" aria-current="page" hx-get="/views/login/index.html" href="" hx-trigger="click" hx-target="#main-content" hx-swap="innerHTML">Already have an Account?</a>
				</nav>
			</form>

			<div id="register-result" class="mt-3"></div>
			
		</div>
	</div>
</div>
